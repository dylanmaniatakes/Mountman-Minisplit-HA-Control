send_state:
  name: Send Mountman state
  description: Send an explicit Mountman mini-split IR state through the selected climate entity.
  target:
    entity:
      integration: mountman_minisplit
      domain: climate
  fields:
    mode:
      name: Mode
      description: Mountman mode to send. Omit to use the current climate entity mode.
      selector:
        select:
          options:
            - "off"
            - "cool"
            - "heat"
            - "dry"
            - "fan_only"
    temp_f:
      name: Temperature
      description: Fahrenheit setpoint. Cool 72F and above uses a one-step shifted field map from live HA testing; heat above 72F is still inferred.
      selector:
        number:
          min: 61
          max: 88
          step: 1
          mode: box
    fan:
      name: Fan
      description: Fan setting to send. Omit to use the current climate entity fan mode.
      selector:
        select:
          options:
            - "auto"
            - "low"
            - "medium"
            - "high"
            - "offish"
    family:
      name: Packet family
      description: Cool-mode packet family. Normal uses byte 5 = 0x24; alternate uses byte 5 = 0x64.
      selector:
        select:
          options:
            - "normal"
            - "alternate"
    b8_override:
      name: Byte 8 override
      description: Optional decimal byte-8 override for fan/swing testing. Use 5 for 0x05 or 61 for 0x3D.
      selector:
        number:
          min: -1
          max: 255
          step: 1
          mode: box
    repeat_count:
      name: Repeat count
      description: Number of times to send the same frame for this test call. Omit to use the integration default.
      selector:
        number:
          min: 1
          max: 5
          step: 1
          mode: box
    repeat_delay_ms:
      name: Repeat delay
      description: Gap between repeated frames in milliseconds. Omit to use the integration default.
      selector:
        number:
          min: 40
          max: 500
          step: 10
          mode: box

send_packet:
  name: Send exact Mountman packet
  description: Send one exact captured or predicted 14-byte Mountman packet through the selected climate entity.
  target:
    entity:
      integration: mountman_minisplit
      domain: climate
  fields:
    packet_hex:
      name: Packet hex
      required: true
      description: Exact 14-byte packet. Spaces are optional; the checksum byte is validated before sending.
      example: "23 CB 26 01 00 24 01 09 05 00 00 00 80 C8"
      selector:
        text:
    repeat_count:
      name: Repeat count
      description: Number of times to send the packet for this test call. Omit to use the integration default.
      selector:
        number:
          min: 1
          max: 5
          step: 1
          mode: box
    repeat_delay_ms:
      name: Repeat delay
      description: Gap between repeated frames in milliseconds. Omit to use the integration default.
      selector:
        number:
          min: 40
          max: 500
          step: 10
          mode: box
